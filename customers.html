<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Contacts</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="top-links">
        <a href="dashboard.html">← Back to Dashboard</a>
    </div>

    <div class="dashboard-container">

        <h1>Customer Contact Management</h1>
        <p>Add and manage customer information</p>

        <form id="customerForm">

            <label>Customer Name</label>
            <input type="text" id="customerName" placeholder="Enter customer name">

            <label>Email Address</label>
            <input type="email" id="customerEmail" placeholder="Enter email">

            <label>Phone Number</label>
            <input type="text" id="customerPhone" placeholder="Enter phone number">

            <label>Company Name</label>
            <input type="text" id="companyName" placeholder="Enter company name">

            <label>Customer Type</label>
            <select id="customerType">
                <option>New Customer</option>
                <option>Existing Customer</option>
                <option>Priority Customer</option>
            </select>

            <button type="submit">
                Add Customer
            </button>

        </form>

        <h3>Customer List</h3>

        <div id="customerList">

        </div>

    </div>

    <script>

        document.getElementById("customerForm")
            .addEventListener("submit", async function (event) {

                event.preventDefault();

                const customerData = {
                    name: document.getElementById("customerName").value,
                    email: document.getElementById("customerEmail").value,
                    phone: document.getElementById("customerPhone").value,
                    company: document.getElementById("companyName").value,
                    type: document.getElementById("customerType").value
                };

                const response = await fetch(
    "https://smart-sales-backend-0hpm.onrender.com/add-customer",
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify(customerData)
                    }
                );

                const data = await response.json();

                alert(data.message);

                const customerList =
                    document.getElementById("customerList");

                customerList.innerHTML += `
                    <p>
                        ${customerData.name} -
                        ${customerData.company}
                    </p>
                `;

            });

    </script>

</body>

</html>
